<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-white dark:bg-slate-900 flex items-center justify-between px-4 h-14 w-full sticky top-0 z-50 border-b border-[#E2E8F0] dark:border-slate-800">
<button class="text-[#4AA9E9] dark:text-[#4AA9E9] hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors active:opacity-80 active:scale-95 transition-all duration-200 p-2 -ml-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Lexend'] font-medium text-lg text-slate-900 dark:text-white flex-1 text-center pr-8">支付结算</h1>
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col p-4 space-y-md w-full max-w-md mx-auto">
<!-- Order Details Card (Collapsible) -->
<div class="bg-white rounded-lg border border-outline-variant p-4">
<div class="flex items-center justify-between cursor-pointer">
<h2 class="font-label-lg text-label-lg text-on-surface">订单详情</h2>
<button class="text-on-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="expand_more">expand_more</span>
</button>
</div>
<div class="mt-4 pt-4 border-t border-outline-variant space-y-sm">
<div class="flex justify-between">
<span class="font-body-sm text-body-sm text-on-surface-variant">套餐名称</span>
<span class="font-body-sm text-body-sm text-on-surface font-medium">全天高级双板套餐</span>
</div>
<div class="flex justify-between items-start">
<span class="font-body-sm text-body-sm text-on-surface-variant">租赁物</span>
<div class="text-right">
<span class="font-body-sm text-body-sm text-on-surface block">高级双板 x1</span>
<span class="font-body-sm text-body-sm text-on-surface block">雪鞋 x1</span>
<span class="font-body-sm text-body-sm text-on-surface block">雪杖 x2</span>
</div>
</div>
<div class="flex justify-between">
<span class="font-body-sm text-body-sm text-on-surface-variant">起租时间</span>
<span class="font-body-sm text-body-sm text-on-surface">2023-11-20 09:00</span>
</div>
</div>
</div>
<!-- Payment Amount -->
<div class="text-center py-sm">
<p class="font-body-sm text-body-sm text-on-surface-variant mb-1">需支付押金</p>
<h2 class="font-headline-lg text-headline-lg text-primary-container tracking-tight">¥1,500.00</h2>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-2">包含租金 ¥500.00</p>
</div>
<!-- QR Code Area -->
<div class="bg-white rounded-xl border border-outline-variant p-6 flex flex-col items-center justify-center space-y-4">
<div class="w-48 h-48 bg-surface-container rounded-lg flex items-center justify-center border border-outline-variant">
<!-- Mock QR Code Image -->
<img alt="Payment QR Code" class="w-full h-full object-cover rounded-lg opacity-80 mix-blend-multiply" data-alt="abstract black and white geometric qr code pattern on white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD42TGPZZpC6Yq4EfQk90jrfvadKWuFe9NKi8Fnow-EJiEi3nq9UPCwN2jbM7O_5gW4CBIrXJQA1-SJ5kO4pLSQKC7TTPdFhy1iTZ-VDDksQ-xbMrPT3yQcA7gm9-65wi-WSr1sIp4gddK5bDU9r5yvaw21CInF5iAtnstMTruins7D5e1oqFZERIb4AVEdewVXuAe0nSIl6kVrSxIpk_BYeDoPq5pJL4yfPebFCT9ykfv05aqgIViGN1S0cFAVCG0FWvPWaOS0nFU"/>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-primary-container text-lg" data-icon="qr_code_scanner">qr_code_scanner</span>
                请顾客扫描二维码支付
            </p>
</div>
<!-- Payment Methods -->
<div class="bg-white rounded-lg border border-outline-variant overflow-hidden">
<!-- Active: WeChat -->
<button class="w-full flex items-center justify-between p-4 border-b border-outline-variant bg-surface-container-low hover:bg-surface-container transition-colors">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-[#09B83E] flex items-center justify-center text-white">
<span class="material-symbols-outlined text-sm" data-icon="chat">chat</span>
</div>
<span class="font-label-md text-label-md text-on-surface">微信支付</span>
</div>
<span class="material-symbols-outlined text-primary-container" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<!-- Inactive: Alipay -->
<button class="w-full flex items-center justify-between p-4 border-b border-outline-variant hover:bg-surface-container-low transition-colors">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-[#1677FF] flex items-center justify-center text-white">
<span class="material-symbols-outlined text-sm" data-icon="payments">payments</span>
</div>
<span class="font-label-md text-label-md text-on-surface">支付宝支付</span>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="radio_button_unchecked">radio_button_unchecked</span>
</button>
<!-- Inactive: Other -->
<button class="w-full flex items-center justify-between p-4 hover:bg-surface-container-low transition-colors">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-secondary flex items-center justify-center text-white">
<span class="material-symbols-outlined text-sm" data-icon="credit_card">credit_card</span>
</div>
<span class="font-label-md text-label-md text-on-surface">其他支付 (现金/刷卡)</span>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="radio_button_unchecked">radio_button_unchecked</span>
</button>
</div>
<!-- Bottom Spacer to push action to bottom if screen is tall -->
<div class="flex-1"></div>
</main>
<!-- Bottom Action -->
<div class="p-4 bg-white border-t border-outline-variant pb-safe sticky bottom-0 z-40 w-full max-w-md mx-auto">
<button class="w-full h-12 bg-primary-container text-on-primary font-label-lg text-label-lg rounded-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center">
            确认支付已完成
        </button>
</div>
