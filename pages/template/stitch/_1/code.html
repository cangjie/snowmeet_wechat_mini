<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-4 h-14 bg-white dark:bg-gray-900 docked full-width top-0 border-b border-gray-200 dark:border-gray-800 flat no shadows z-10 sticky">

</button>
<h1 class="text-sky-500 dark:text-sky-400 font-bold text-xl font-['Lexend'] font-semibold text-lg">PeakFlow Rental</h1>
<button class="flex items-center justify-center w-10 h-10 rounded-full text-sky-500 dark:text-sky-400 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors duration-200 active:opacity-70">
<span class="material-symbols-outlined">qr_code_scanner</span>
</button>
</header>
<!-- Main Canvas -->

<!-- Page Header -->
<div class="mb-md">
<h2 class="font-headline-md text-headline-md text-on-surface">开始开单</h2>
<button class="flex items-center justify-between w-full mt-xs p-2 rounded-lg border border-outline-variant/30 bg-surface-container-low/30 hover:bg-surface-container-low transition-colors group">
<div class="flex items-center gap-2 text-secondary font-body-sm text-body-sm">
<span class="material-symbols-outlined text-[16px]">location_on</span>
<span>当前店铺: 雪遇崇礼万龙店</span>
</div>
<span class="material-symbols-outlined text-outline text-[18px] group-hover:text-primary">arrow_drop_down</span>
</button>
</div>
<!-- Customer Info Bento -->
<section class="glass-card rounded-xl p-md mb-md shadow-sm border border-outline-variant/30 bg-surface-container-lowest">
<h3 class="font-label-lg text-label-lg text-on-surface mb-sm flex items-center gap-2">
<span class="material-symbols-outlined text-primary">person</span>
                顾客信息
            </h3>
<div class="space-y-sm">
<!-- Name Input -->
<div class="flex flex-col">
<label class="font-label-md text-label-md text-on-surface-variant mb-xs">顾客姓名</label>
<input class="h-12 w-full rounded-lg border-outline-variant bg-surface-container-lowest px-3 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary transition-colors outline-none placeholder:text-outline" placeholder="输入姓名" type="text"/>
</div>
<!-- Gender Segmented Control -->
<div class="flex flex-col">
<label class="font-label-md text-label-md text-on-surface-variant mb-xs">性别</label>
<div class="flex bg-surface-container-low rounded-lg p-1 h-12">
<button class="flex-1 rounded-md bg-surface-container-lowest shadow-sm text-primary font-label-lg text-label-lg transition-all flex items-center justify-center">
                            男
                        </button>
<button class="flex-1 rounded-md text-secondary font-label-lg text-label-lg hover:bg-surface-container/50 transition-all flex items-center justify-center">
                            女
                        </button>
</div>
</div>
<!-- Phone Input -->
<div class="flex flex-col">
<label class="font-label-md text-label-md text-on-surface-variant mb-xs">手机号</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-outline">smartphone</span>
<input class="h-12 w-full rounded-lg border-outline-variant bg-surface-container-lowest pl-10 pr-3 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary transition-colors outline-none placeholder:text-outline" placeholder="输入手机号" type="tel"/>
</div>
</div>
</div>
</section>
<!-- Business Type Selection -->
<section class="">
<h3 class="font-label-lg text-label-lg text-on-surface mb-sm flex items-center gap-2">
<span class="material-symbols-outlined text-primary">category</span>
                业务类型
            </h3>

<button class="flex flex-col items-center justify-center p-3 rounded-xl border border-outline-variant/30 bg-surface-container-lowest hover:border-primary/50 transition-colors gap-2 shadow-sm relative"><div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-secondary">

<span class="font-label-md text-label-md text-on-surface">零售</span>
<span class="material-symbols-outlined text-outline text-[16px] absolute bottom-2 right-2">chevron_right</span></button>

<span class="material-symbols-outlined text-outline text-[16px] absolute bottom-2 right-2">chevron_right</span></button>

<button class="flex flex-col items-center justify-center p-3 rounded-xl border-2 border-primary bg-primary-fixed/20 transition-all gap-2 relative overflow-hidden shadow-sm"><div class="absolute top-0 right-0 bg-primary text-on-primary w-6 h-6 flex items-center justify-center rounded-bl-lg">

</div>
<div class="w-10 h-10 rounded-full bg-primary text-on-primary flex items-center justify-center shadow-inner">
<span class="material-symbols-outlined text-xl">snowboarding</span>
</div>
<span class="font-label-md text-label-md text-primary">租赁</span>
<span class="material-symbols-outlined text-primary text-[16px] absolute bottom-2 right-2">chevron_right</span></button></div>
</section>

</main>

<span class="material-symbols-outlined mb-1">person</span>
